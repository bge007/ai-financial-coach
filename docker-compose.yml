services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [qdrant]
    volumes:
      - "./config:/app/config:ro"
      - "db_data:/app/data"

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    depends_on: [backend]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrant_storage:/qdrant/storage"]

volumes:
  qdrant_storage:
  db_data:
