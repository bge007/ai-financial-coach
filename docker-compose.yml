services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: sqlite+aiosqlite:///./data/coach.db
    depends_on: [qdrant]
    volumes:
      - "./config:/app/config:ro"
      - "db_data:/app/data"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    environment:
      BACKEND_URL: http://backend:8000
    depends_on: [backend]
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports: ["6333:6333"]
    volumes: ["qdrant_storage:/qdrant/storage"]
    restart: unless-stopped

volumes:
  qdrant_storage:
  db_data:
